# ============================================================
# korean-bertopic-pipeline 설정 파일
# 이 파일을 config.yaml로 복사 후 수정하세요
# cp config.example.yaml config.yaml
# ============================================================

# ── 입력 데이터 ──────────────────────────────────────────────
data:
  # 분석할 CSV 파일 경로 (프로젝트 루트 기준)
  input_path: "data/sample/sample_texts.csv"

  # 텍스트가 있는 컬럼명
  text_column: "text"

  # 문서 식별자 컬럼 (없으면 null)
  id_column: null

  # 날짜 컬럼 (시계열 분석용, 없으면 null)
  # 형식: YYYY-MM-DD 또는 YYYYMMDD
  date_column: null

  # 필터링 컬럼 (품질 검증 결과 등, 없으면 null)
  verify_column: null
  verify_values: null
  # 예시: verify_column: "verify"
  #        verify_values: ["accept_exact", "accept_keyword"]


# ── 임베딩 설정 ───────────────────────────────────────────────
embedding:
  # 임베딩 모델 선택
  # - "BAAI/bge-m3"                   : SOTA 다국어, 1024d, GPU 강력 권장
  # - "jhgan/ko-sroberta-multitask"    : 경량 한국어, 768d, CPU도 가능
  # - "sentence-transformers/all-MiniLM-L6-v2" : 영어 경량, 384d
  model: "BAAI/bge-m3"

  # 문서당 최대 문자 수 (임베딩 입력 절단)
  # bge-m3: 2500자 (8192 토큰), ko-sroberta: 1000자 (512 토큰)
  max_chars: 2500

  # 배치 크기 (null = VRAM 자동 감지 권장)
  # RTX 5060 Ti (16GB) 기준:
  #   Ollama 미실행 시 → bge-m3: ~24, ko-sroberta: ~80
  #   Ollama gemma4:26b 실행 중 → bge-m3: ~4 (자동 조정됨)
  # CPU 전용: bge-m3: 8, ko-sroberta: 32
  batch_size: null   # null = 자동 감지 (권장)

  # 임베딩 L2 정규화 (코사인 유사도 사용 시 True 권장)
  normalize: true

  # 임베딩 파일 저장 경로
  output_dir: "data/embeddings"


# ── 토크나이저 설정 ──────────────────────────────────────────
tokenizer:
  # 토크나이저 종류
  # - "bareun"      : 한국어 형태소 분석 (Bareun gRPC 서버 — 별도 컨테이너/서버 필요)
  # - "kiwi"        : 한국어 형태소 분석 (in-process, pip install kiwipiepy 필요)
  # - "whitespace"  : 공백 기준 분리 (범용, 기본값)
  # - "none"        : 토크나이저 미적용 (BERTopic 내부 사용)
  type: "whitespace"

  # Kiwi 사용자 사전 경로 (kiwi 전용, 없으면 null)
  user_dict_path: null
  # 예시: user_dict_path: "data/dictionaries/user_dict.txt"

  # 불용어 파일 경로 (없으면 null)
  stopwords_path: null
  # 예시: stopwords_path: "data/dictionaries/stopwords.txt"

  # 최소 토큰 길이
  min_token_len: 2

  # Bareun 서버 접속 설정 (type: "bareun" 일 때만 사용)
  # 백엔드: bareun-pipeline (배치/병렬 httpx 클라이언트 + 사용자 사전 관리)
  #   참조: https://github.com/rubato103/bareun-pipeline
  # Bareun은 별도 서버로 동작 → docker-compose의 'bareun' 서비스 사용
  # API key 발급: https://bareun.ai
  bareun:
    host: "localhost"   # docker-compose 사용 시 "bareun"
    port: 5656
    apikey: null        # null이면 BAREUN_API_KEY 환경변수 사용
    # 사용자 사전 도메인 — scripts/00_dict.py로 등록·튜닝 후 이름 나열
    custom_dict_names: []
    batch_size: 50      # 배치당 문장 수
    max_workers: 8      # 병렬 요청 수
    combine_consecutive_nominals: true   # 연속 NNG/NNP 결합


# ── 파라미터 튜닝 (선택) ────────────────────────────────────
tuning:
  # 튜닝 실행 여부
  enabled: true

  # 목표 토픽 수 범위 [최소, 최대]
  target_topics: [20, 50]

  # 병렬 처리 워커 수 (null = CPU 자동 감지 권장)
  # Ryzen 7 5700G (8C/16T, 32GB RAM) 기준 자동값: 6
  # 워커당 RAM ~2.5GB 소모 → 6 × 2.5 = 15GB (32GB 중 안전)
  n_workers: null   # null = optimal_workers() 자동 감지

  # 튜닝 결과 저장 경로 (임베딩과 같은 경로에 저장 권장)
  output_dir: "data/embeddings"

  # UMAP 파라미터 그리드
  umap:
    n_neighbors: [10, 15, 20]   # 작을수록 지역 구조 강조
    n_components: [5, 10, 15]   # 차원 수 (5-15 권장)
    min_dist: [0.0, 0.05]       # 0.0 = 클러스터 압축

  # HDBSCAN 파라미터 그리드
  hdbscan:
    min_cluster_size: [100, 150, 200, 250, 300]  # 클수록 토픽 수 감소
    min_samples: [10, 15, 20]
    cluster_selection_method: ["eom"]  # eom (뉴스 텍스트 권장)


# ── BERTopic 모델 설정 ───────────────────────────────────────
model:
  # 토픽 수 강제 지정 (null = 자동)
  nr_topics: null

  # CountVectorizer 파라미터
  min_df: 5        # 최소 문서 빈도 (희귀 단어 제거)
  max_df: 0.95     # 최대 문서 빈도 비율 (너무 일반적인 단어 제거)

  # 토픽 표현 방법 — 나열 순서대로 체인 적용되어 '주 표현'을 정제
  # (예: KeyBERT로 관련성↑ → MMR로 다양성↑). 빈 리스트면 c-TF-IDF 원형 사용.
  # "LLM"을 마지막에 추가하면 vLLM으로 한국어 토픽 라벨 생성 (아래 llm 설정).
  representation:
    - "KeyBERT"   # 키버트 기반 핵심 단어 (관련성)
    - "MMR"       # 최대 주변 관련성 (다양성 확보)
    # - "LLM"     # (선택) vLLM 로컬 모델로 자연어 토픽 라벨 — uv sync --extra llm

  # MMR 다양성 (0=최대 유사성, 1=최대 다양성)
  mmr_diversity: 0.3

  # LLM 토픽 표현 (representation에 "LLM"이 있을 때만 사용)
  # vLLM의 OpenAI 호환 엔드포인트에 연결 — 표준 BERTopic OpenAI 표현 모델 사용.
  # 학술 근거: TopicGPT(NAACL 2024), LLM 기반 토픽 라벨링(arXiv:2502.18469).
  llm:
    base_url: "http://localhost:8000/v1"   # vLLM OpenAI 호환 주소
    model: null            # vLLM이 서빙 중인 모델명 (필수). 예: "Qwen/Qwen2.5-7B-Instruct"
    api_key: null          # null이면 OPENAI_API_KEY 또는 "EMPTY"(vLLM 무인증)
    chat: true             # /v1/chat/completions
    temperature: 0.0
    nr_docs: 4             # 토픽당 LLM에 제공할 대표 문서 수
    prompt: null           # null이면 내장 한국어 프롬프트(환각 완화 지시 포함)

  # 모델 저장 경로
  output_dir: "data/model_results"

  # 모델 파일 저장 여부
  save_model: true


# ── cuML GPU 가속 ────────────────────────────────────────────
cuml:
  # RAPIDS cuML로 UMAP + HDBSCAN을 GPU에서 실행
  # null  = 자동 감지 (cuml import 성공 시 활성화)
  # true  = 강제 활성화 (cuML 미설치 시 오류)
  # false = 강제 비활성화 (CPU 모드)
  #
  # 속도 비교 (44K docs, RTX 5060 Ti 기준):
  #   UMAP  : CPU ~30분 → GPU ~30초
  #   튜닝  : CPU ~3시간 → GPU ~5분
  #
  # 설치 (WSL2 필수):
  #   conda install -c rapidsai cuml=25.04 python=3.12 cuda-version=12.8
  # RTX 5060 Ti (sm_120): RAPIDS 25.04+ 필요
  enabled: null   # null = 자동 감지 (권장)
